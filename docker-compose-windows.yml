services:
  # Nginx Proxy Manager（推荐）
  npm:
    image: hub.rat.dev/jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"  # 管理界面
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt

  nvim:
    image: hub.rat.dev/danding19931115/nvim-lerko
    container_name: nvim-lerko
    network_mode: "host"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - D:\coder:/workspace
      # Go 缓存持久化
      - go-mod-cache:/root/go/pkg/mod
      - cache:/root/.cache
      - C:\Users\cheny\.ssh:/tmp/.ssh:ro
      - ./script:/tmp/script
    tty: true
    stdin_open: true
  syncclipboard:
    image: hub.rat.dev/jericx/syncclipboard-server
    container_name: syncclipboard
    restart: unless-stopped
    ports:
      - "5033:5033"  # 改为端口映射
    environment:
      - USERNAME=admin
      - PASSWORD=admin
    volumes:
      - ./data:/app/data  # 持久化数据

volumes:
  go-mod-cache:
  cache:
  workspace:
  npm-data:
  npm-letsencrypt:

